<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Inventory Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F2F2F7;--surface:#FFFFFF;--surface2:#F9F9FB;
  --text:#1C1C1E;--text2:#8E8E93;--text3:#AEAEB2;
  --accent:#007AFF;--success:#34C759;--warning:#FF9500;--danger:#FF3B30;
  --sep:#E5E5EA;--r:12px;--r-sm:8px;--r-lg:16px;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
#app{display:flex;min-height:100vh}

/* ── SIDEBAR ── */
.sidebar{width:220px;background:var(--surface);border-right:1px solid var(--sep);position:fixed;top:0;left:0;height:100vh;z-index:100;display:flex;flex-direction:column;padding:20px 0;overflow-y:auto}
.sidebar-logo{padding:0 16px 18px;font-size:15px;font-weight:700;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--sep);margin-bottom:8px}
.sidebar-logo svg{color:var(--accent)}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;margin:1px 8px;border-radius:var(--r-sm);font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s;user-select:none}
.nav-item:hover{background:var(--bg);color:var(--text)}
.nav-item.active{background:#E8F2FF;color:var(--accent);font-weight:600}
.nav-item svg{width:16px;height:16px;flex-shrink:0}

/* ── MAIN ── */
#main{margin-left:220px;flex:1;padding:28px 32px}
.page-hdr{margin-bottom:20px}
.page-hdr-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
.page-title{font-size:24px;font-weight:700;line-height:1.2}
.page-sub{font-size:12px;color:var(--text2);margin-top:3px}

/* ── STATS ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:18px}
.stat-card{background:var(--surface);border-radius:var(--r-lg);padding:16px 18px;box-shadow:var(--shadow)}
.stat-lbl{font-size:10.5px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stat-val{font-size:24px;font-weight:700;line-height:1}
.c-accent{color:var(--accent)}.c-warn{color:var(--warning)}.c-danger{color:var(--danger)}.c-ok{color:var(--success)}

/* ── CARD ── */
.card{background:var(--surface);border-radius:var(--r-lg);padding:18px 20px;box-shadow:var(--shadow);margin-bottom:14px}
.card-title{font-size:10.5px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* ── DATE FILTER BAR ── */
.date-filter-bar{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:13px}
.date-chip{padding:5px 13px;border-radius:100px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--sep);background:var(--surface);color:var(--text2);transition:all .15s;white-space:nowrap;font-family:'Poppins',sans-serif}
.date-chip:hover{border-color:var(--accent);color:var(--accent)}
.date-chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
.date-chip-lbl{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;align-self:center}
input[type="date"].date-inp{padding:5px 10px;border-radius:100px;border:1.5px solid var(--sep);font-family:'Poppins',sans-serif;font-size:12px;color:var(--text);background:var(--surface);outline:none;cursor:pointer;max-width:150px;transition:border-color .15s}
input[type="date"].date-inp:focus{border-color:var(--accent)}

/* ── ITEM HISTORY MODAL ── */
.hist-item-sel{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.hist-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 13px;border-radius:100px;font-size:12.5px;font-weight:600;background:var(--bg)}

/* ── SUPPLIER CARDS ── */
.sup-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.sup-card{background:var(--surface);border-radius:var(--r-lg);padding:18px;box-shadow:var(--shadow);position:relative}
.sup-name{font-size:15px;font-weight:600;margin-bottom:3px}
.sup-contact{font-size:12px;color:var(--text2);margin-bottom:10px}
.sup-meta{display:flex;flex-direction:column;gap:5px;font-size:12px;color:var(--text2)}
.sup-meta span{display:flex;align-items:center;gap:6px}
.sup-actions{display:flex;gap:6px;margin-top:14px;padding-top:12px;border-top:1px solid var(--sep)}
.sup-badge{position:absolute;top:14px;right:14px;background:var(--bg);color:var(--text2);font-size:11px;font-weight:600;padding:3px 9px;border-radius:100px}

/* ── CATEGORIES ── */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px}
.cat-card{background:var(--surface);border-radius:var(--r);padding:14px 16px;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px}
.cat-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.cat-name{font-size:13.5px;font-weight:500;flex:1}
.cat-count{font-size:11px;color:var(--text2)}
.color-swatches{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s}
.swatch.sel{border-color:var(--text);transform:scale(1.15)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:var(--r-sm);font-family:'Poppins',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#005FCC}
.btn-success{background:var(--success);color:#fff}.btn-success:hover{opacity:.88}
.btn-ghost{background:var(--bg);color:var(--text)}.btn-ghost:hover{background:var(--sep)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-icon{padding:6px;border:none;background:transparent;cursor:pointer;color:var(--text2);border-radius:var(--r-sm);display:inline-flex;align-items:center;transition:all .15s}
.btn-icon:hover{background:var(--bg);color:var(--text)}
.btn-row{display:flex;gap:7px;flex-wrap:wrap}
.btn-danger-ghost{color:var(--danger)}

/* ── TOOLBAR ── */
.toolbar{display:flex;align-items:center;gap:9px;margin-bottom:12px;flex-wrap:wrap}
.search-inp{flex:1;min-width:180px;padding:8px 12px;border-radius:var(--r-sm);border:1px solid var(--sep);font-family:'Poppins',sans-serif;font-size:13px;color:var(--text);background:var(--surface);outline:none;transition:border-color .15s}
.search-inp:focus{border-color:var(--accent)}
.search-inp::placeholder{color:var(--text3)}
.filter-sel{padding:8px 12px;border-radius:var(--r-sm);border:1px solid var(--sep);font-family:'Poppins',sans-serif;font-size:13px;color:var(--text);background:var(--surface);outline:none;cursor:pointer}

/* ── TABLE ── */
.tbl-wrap{background:var(--surface);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow);overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{padding:10px 14px;text-align:left;font-size:10.5px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--sep);background:var(--surface2);white-space:nowrap}
td{padding:12px 14px;font-size:13px;border-bottom:1px solid var(--sep)}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFAFA}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:100px;font-size:11px;font-weight:600}
.b-ok{background:#E3F9E8;color:#1A7F3C}.b-low{background:#FFF3E0;color:#C75B00}.b-out{background:#FFE8E8;color:#CC0000}
.b-cat{background:var(--bg);color:var(--text2)}

/* ── FORMS ── */
.form-group{margin-bottom:13px}
label{display:block;font-size:10.5px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
input,select,textarea{width:100%;padding:9px 12px;border-radius:var(--r-sm);border:1px solid var(--sep);font-family:'Poppins',sans-serif;font-size:13px;color:var(--text);background:var(--surface);outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:72px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:11px}

/* ── MODAL ── */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.38);backdrop-filter:blur(5px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-ov.hidden{display:none}
.modal{background:var(--surface);border-radius:var(--r-lg);width:100%;max-width:520px;max-height:88vh;overflow-y:auto;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.18)}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-title{font-size:16px;font-weight:600}
.modal-ftr{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;padding-top:13px;border-top:1px solid var(--sep)}

/* ── ALERTS ── */
.alert{background:#FFF8E8;border:1px solid #FFD180;border-radius:var(--r-sm);padding:12px 14px;margin-bottom:9px;font-size:13px}
.alert.danger{background:#FFE8E8;border-color:#FFB3B3}

/* ── LOG ITEMS ── */
.log-item{display:flex;align-items:flex-start;gap:11px;padding:12px 0;border-bottom:1px solid var(--sep)}
.log-item:last-child{border-bottom:none}
.log-dot{width:7px;height:7px;border-radius:50%;margin-top:5px;flex-shrink:0}
.log-dot.in{background:var(--success)}.log-dot.out{background:var(--danger)}

/* ── AI ── */
.ai-box{background:var(--bg);border-radius:var(--r);padding:16px;font-size:13px;line-height:1.75;color:var(--text);white-space:pre-wrap;min-height:100px}
.ai-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:13px}

/* ── SEGMENT ── */
.segment{display:flex;background:var(--bg);border-radius:var(--r-sm);padding:3px;width:100%}
.seg-btn{flex:1;padding:7px;border-radius:6px;font-size:12.5px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--text2);font-family:'Poppins',sans-serif;transition:all .15s;text-align:center}
.seg-btn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1)}

/* ── SPINNER ── */
.spinner{width:16px;height:16px;border:2px solid var(--sep);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── EMPTY ── */
.empty{text-align:center;padding:48px 20px;color:var(--text2)}
.empty-icon{font-size:34px;margin-bottom:9px}
.empty-ttl{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px}
.empty-sub{font-size:12.5px}

/* ── TOAST ── */
#toasts{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:2000;display:flex;flex-direction:column;gap:7px;align-items:center;pointer-events:none}
.toast{background:#1C1C1E;color:#fff;padding:8px 18px;border-radius:100px;font-size:12.5px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.2);white-space:nowrap;animation:tst .2s ease}
@keyframes tst{from{opacity:0;transform:translateY(5px)}}

/* ── RESULT COUNT ── */
.result-count{font-size:12px;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.result-count strong{color:var(--text);font-weight:600}

/* ── BOTTOM NAV ── */
.bnav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.93);backdrop-filter:blur(20px);border-top:1px solid var(--sep);z-index:100;padding:5px 0 max(env(safe-area-inset-bottom),4px)}
.bnav-items{display:flex;justify-content:space-around}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 10px;cursor:pointer;color:var(--text3);font-size:9px;font-weight:500;user-select:none;min-width:50px}
.bnav-item.active{color:var(--accent)}
.bnav-item svg{width:20px;height:20px}

/* ── REPORT PRINT ── */
.report-header{text-align:center;margin-bottom:18px;padding-bottom:14px;border-bottom:2px solid var(--text)}
.report-biz{font-size:19px;font-weight:700;cursor:pointer}
.report-biz:hover{text-decoration:underline}
.report-sub{font-size:11.5px;color:var(--text2);margin-top:3px}
.report-summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.report-summary-card{background:var(--bg);border-radius:var(--r-sm);padding:12px;text-align:center}
.report-summary-card .val{font-size:20px;font-weight:700;line-height:1;margin-bottom:3px}
.report-summary-card .lbl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px}
.report-section-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid var(--sep)}
.report-table{width:100%;border-collapse:collapse;font-size:12px}
.report-table th{padding:8px 10px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;border-bottom:2px solid var(--sep);background:var(--surface2)}
.report-table td{padding:8px 10px;border-bottom:1px solid var(--sep)}
.report-table tr:last-child td{border-bottom:none}
.report-table tfoot td{font-weight:700;border-top:2px solid var(--sep);padding-top:10px}

/* ── PRINT ── */
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  .no-print,.sidebar,.bnav,#toasts,.modal-ov{display:none!important}
  #main{margin-left:0!important;padding:0!important}
  body{background:#fff!important}
  .card{box-shadow:none!important;border:1px solid #E5E5EA!important;margin-bottom:14px!important}
  .page-break{page-break-before:always;break-before:always}
  .avoid-break{page-break-inside:avoid;break-inside:avoid}
  .stats-grid,.report-summary-grid{grid-template-columns:repeat(4,1fr)!important}
  @page{margin:1.5cm;size:portrait}
}

/* ── RESPONSIVE — MOBILE ── */
@media(max-width:768px){
  .sidebar{display:none}.bnav{display:block}
  #main{margin-left:0;padding:16px 14px 92px}
  .stats-grid{grid-template-columns:1fr 1fr;gap:9px}
  .form-row{grid-template-columns:1fr}
  .two-col{grid-template-columns:1fr}
  .page-title{font-size:20px}
  .stat-val{font-size:20px}
  .stat-card{padding:14px 15px}
  .card{padding:15px 16px}
  .toolbar{flex-direction:column;align-items:stretch}
  .search-inp{min-width:unset}
  .sup-grid{grid-template-columns:1fr}
  .report-summary-grid{grid-template-columns:1fr 1fr!important}

  /* Date chips — horizontal scroll, no wrap */
  .date-filter-bar{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px;scrollbar-width:none;gap:6px}
  .date-filter-bar::-webkit-scrollbar{display:none}
  .date-chip{flex-shrink:0;padding:6px 13px;font-size:11.5px;min-height:34px}
  .date-chip-lbl{flex-shrink:0}

  /* Item filter chips in movements — horizontal scroll */
  .item-chip-row{display:flex;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;gap:6px;padding-bottom:4px;scrollbar-width:none}
  .item-chip-row::-webkit-scrollbar{display:none}
  .item-chip-row .date-chip{flex-shrink:0}

  /* Full-screen modal on mobile */
  .modal-ov{align-items:flex-end;padding:0}
  .modal{border-radius:var(--r-lg) var(--r-lg) 0 0;max-width:100%;max-height:92vh;padding:22px 18px;padding-bottom:max(22px,env(safe-area-inset-bottom))}

  /* Bigger touch targets */
  .btn-icon{padding:9px;min-width:36px;min-height:36px;justify-content:center}
  .btn{min-height:38px}
  .btn-sm{min-height:34px}
  .nav-item,.bnav-item{min-height:44px}

  /* Table horizontal scroll */
  .tbl-wrap{border-radius:var(--r)}
  table{min-width:560px}

  /* Tighten page header on mobile */
  .page-hdr{margin-bottom:14px}
  .page-hdr-row{gap:9px}
}

/* ── SAFE AREA — iPhone notch/home bar ── */
@supports(padding-bottom:env(safe-area-inset-bottom)){
  .bnav{padding-bottom:calc(5px + env(safe-area-inset-bottom))}
  #main{padding-bottom:calc(92px + env(safe-area-inset-bottom))}
}

/* ── EXTRA SMALL — 380px and below ── */
@media(max-width:380px){
  #main{padding:13px 11px 92px}
  .page-title{font-size:18px}
  .stat-val{font-size:18px}
  .stats-grid{gap:7px}
  .stat-card{padding:12px 13px}
}
</style>
</head>
<body>
<div id="app">
  <nav class="sidebar">
    <div class="sidebar-logo">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
      Inventory
    </div>
    <div id="snav"></div>
  </nav>
  <main id="main"><div id="view"></div></main>
  <nav class="bnav"><div class="bnav-items" id="bnav"></div></nav>
  <div class="modal-ov hidden" id="modal-ov"><div class="modal" id="modal-body"></div></div>
  <div id="toasts"></div>
</div>

<script>
// ══════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════
const COLORS=['#007AFF','#34C759','#FF9500','#FF3B30','#AF52DE','#FF2D55','#5AC8FA','#FFCC00','#32ADE6','#FF6B35'];
const SVG_X=`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;

const DATE_RANGES=[
  {id:'all',lbl:'All Time'},
  {id:'today',lbl:'Today'},
  {id:'yesterday',lbl:'Yesterday'},
  {id:'7days',lbl:'Last 7 Days'},
  {id:'30days',lbl:'Last 30 Days'},
  {id:'1year',lbl:'Last 1 Year'},
  {id:'specific',lbl:'Specific Date'},
];

const NAV=[
  {id:'dashboard',lbl:'Dashboard',m:true,icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>`},
  {id:'inventory',lbl:'Inventory',m:true,icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>`},
  {id:'suppliers',lbl:'Suppliers',m:true,icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`},

// DATE UTILS
// ══════════════════════════════════════
function todayStr(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function dayStart(offsetDays=0){
  const d=new Date();d.setHours(0,0,0,0);
  if(offsetDays)d.setDate(d.getDate()+offsetDays);
  return d.getTime();
}
function filterByRange(list,range,specific){
  const now=new Date(),today=dayStart();
  return list.filter(m=>{
    const ts=m.ts||m.date||0;
    switch(range){
      case 'today':    return ts>=today;
      case 'yesterday':return ts>=dayStart(-1)&&ts<today;
      case '7days':    return ts>=dayStart(-6);
      case '30days':   return ts>=dayStart(-29);
      case '1year':    return ts>=dayStart(-364);
      case 'specific':{
        if(!specific)return true;
        const sd=new Date(specific+'T00:00:00');
        const se=new Date(specific+'T23:59:59');
        return ts>=sd.getTime()&&ts<=se.getTime();
      }
      default:return true;
    }
  });
}
function fdate(ts){return new Date(ts).toLocaleDateString('en-PH',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'});}
function fdateS(ts){return new Date(ts).toLocaleDateString('en-PH',{month:'short',day:'numeric',year:'numeric'});}
function longDate(){return new Date().toLocaleDateString('en-PH',{weekday:'long',year:'numeric',month:'long',day:'numeric'});}

// Auto-refresh at midnight to keep "Today" filter accurate
function schedMidnightRefresh(){
  const now=new Date(),msToMidnight=new Date(now.getFullYear(),now.getMonth(),now.getDate()+1)-now;
  setTimeout(()=>{S._today=todayStr();render();schedMidnightRefresh();},msToMidnight);
}

function vMov(){

  // date filter
  list=filterByRange(list,S.movDateRange,S.movSpecificDate);
  list=list.slice().reverse();
  const totalIn=list.filter(m=>m.type==='in').reduce((s,m)=>s+m.qty,0);
  const totalOut=list.filter(m=>m.type==='out').reduce((s,m)=>s+m.qty,0);
  return `
    <div class="page-hdr">
      <div class="page-hdr-row">
        <div><div class="page-title">Movements</div><div class="page-sub">Stock in/out history</div></div>

      <div class="card-title">Filter by Item</div>
      <div class="item-chip-row">
        <button class="date-chip ${S.movItemFilter==='all'?'active':''}" onclick="S.movItemFilter='all';renderView()">All Items</button>
        ${S.items.map(i=>`<button class="date-chip ${S.movItemFilter===i.id?'active':''}" onclick="S.movItemFilter='${i.id}';renderView()">${i.name}</button>`).join('')}

    <div class="stats-grid" style="grid-template-columns:repeat(3,1fr)">
      <div class="stat-card"><div class="stat-lbl">Results</div><div class="stat-val c-accent">${list.length}</div></div>

      <div class="stat-card"><div class="stat-lbl">Total Out</div><div class="stat-val c-danger">−${totalOut}</div></div>
    </div>`:''}

function vReport(){
  let moves=filterByRange(S.movements,S.repDateRange,S.repSpecificDate);

  const lowItems=items.filter(i=>status(i)==='low'),outItems=items.filter(i=>status(i)==='out');
  const now=new Date().toLocaleDateString('en-PH',{year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'});
  const periodLbl=rangeLbl(S.repDateRange,S.repSpecificDate);
  const catRows=S.categories.map(c=>({name:c.name,color:c.color,count:itemsByCat(c.id).length,value:itemsByCat(c.id).reduce((s,i)=>s+i.qty*i.cost,0)})).filter(r=>r.count>0).sort((a,b)=>b.value-a.value);
  const supRows=S.suppliers.map(s=>({name:s.name,contact:s.contact,count:itemsBySup(s.id).length,value:itemsBySup(s.id).reduce((x,i)=>x+i.qty*i.cost,0)})).filter(r=>r.count>0);

  // Per-item movement summary for date range
  const itemMovSummary=S.items.map(i=>{
    const iMoves=moves.filter(m=>m.iid===i.id);
    const totalIn=iMoves.filter(m=>m.type==='in').reduce((s,m)=>s+m.qty,0);
    const totalOut=iMoves.filter(m=>m.type==='out').reduce((s,m)=>s+m.qty,0);
    return{...i,totalIn,totalOut,moveCount:iMoves.length};
  }).filter(i=>i.moveCount>0).sort((a,b)=>b.moveCount-a.moveCount);

  return `
    <div class="page-hdr no-print">
      <div class="page-hdr-row">
        <div><div class="page-title">Reports</div><div class="page-sub">Print-ready · Click business name to edit</div></div>
        <div class="btn-row">
          <button class="btn btn-ghost btn-sm" onclick="exportCSV()">📥 Export CSV</button>
          <button class="btn btn-success btn-sm" onclick="window.print()">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
            Print Report
          </button>
        </div>
      </div>
    </div>
    <div class="card no-print">
      <div class="card-title">Report Period</div>
      ${dateFilterBar('repDateRange','repSpecificDate','setRepRange','repSpecificDate')}
      <div style="font-size:12px;color:var(--text2);margin-top:6px">Report will reflect movements for: <strong>${periodLbl}</strong></div>
    </div>

    <div class="card avoid-break">
      <div class="report-header">
        <div class="report-biz" onclick="editBizName()" title="Click to edit">${S.biz}</div>
        <div class="report-sub">Inventory Report · ${periodLbl} · Generated ${now}</div>
      </div>
      <div class="report-summary-grid">
        <div class="report-summary-card"><div class="val c-accent">${items.length}</div><div class="lbl">Total Items</div></div>
        <div class="report-summary-card"><div class="val" style="font-size:16px;font-weight:700">${peso(totalVal)}</div><div class="lbl">Total Value</div></div>
        <div class="report-summary-card"><div class="val c-warn">${lowItems.length}</div><div class="lbl">Low Stock</div></div>
        <div class="report-summary-card"><div class="val c-danger">${outItems.length}</div><div class="lbl">Out of Stock</div></div>
      </div>
    </div>

    ${(lowItems.length||outItems.length)?`<div class="card avoid-break">
      <div class="report-section-title">⚠ Stock Alerts</div>
      ${[...outItems,...lowItems].map(i=>`<div class="alert ${status(i)==='out'?'danger':''}"><strong>${i.name}</strong> — ${status(i)==='out'?'Out of stock':`${i.qty} ${i.unit} remaining (reorder at ${i.reorder})`}</div>`).join('')}
    </div>`:''}

    <div class="card">
      <div class="report-section-title">Full Inventory — Current Stock</div>
      <div style="overflow-x:auto">
        <table class="report-table">
          <thead><tr><th>#</th><th>Item</th><th>Category</th><th>Supplier</th><th>Qty</th><th>Unit</th><th>Cost/Unit</th><th>Total Value</th><th>Reorder Pt</th><th>Status</th></tr></thead>
          <tbody>
            ${items.map((i,idx)=>{const c=getCat(i.catId),s=getSup(i.supId),st=status(i);return `<tr>
              <td style="color:var(--text3)">${idx+1}</td>
              <td style="font-weight:500">${i.name}</td>
              <td>${c?c.name:'—'}</td><td>${s?s.name:'—'}</td>
              <td>${i.qty}</td><td>${i.unit}</td><td>${peso(i.cost)}</td>
              <td style="font-weight:600">${peso(i.qty*i.cost)}</td>
              <td>${i.reorder} ${i.unit}</td>
              <td><span class="badge ${bsl[st]}">${bsn[st]}</span></td>
            </tr>`;}).join('')}
          </tbody>
          <tfoot><tr>
            <td colspan="7" style="text-align:right;font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--text2)">Total</td>
            <td style="color:var(--accent)">${peso(totalVal)}</td><td colspan="2"></td>
          </tr></tfoot>
        </table>
      </div>
    </div>

    ${itemMovSummary.length?`<div class="card avoid-break page-break">
      <div class="report-section-title">Movement Activity — ${periodLbl}</div>
      <table class="report-table">
        <thead><tr><th>Item</th><th>Category</th><th>Movements</th><th>Total In</th><th>Total Out</th><th>Net Change</th></tr></thead>
        <tbody>${itemMovSummary.map(i=>{const c=getCat(i.catId);const net=i.totalIn-i.totalOut;return `<tr>
          <td style="font-weight:500">${i.name}</td>
          <td>${c?c.name:'—'}</td>
          <td>${i.moveCount}</td>
          <td style="color:var(--success)">+${i.totalIn} ${i.unit}</td>
          <td style="color:var(--danger)">−${i.totalOut} ${i.unit}</td>
          <td style="font-weight:600;color:${net>=0?'var(--success)':'var(--danger)'}">${net>=0?'+':''}${net} ${i.unit}</td>
        </tr>`}).join('')}</tbody>
      </table>
    </div>`:`<div class="card avoid-break"><div class="report-section-title">Movement Activity — ${periodLbl}</div><div style="color:var(--text2);font-size:13px;padding:10px 0">No movements recorded for this period.</div></div>`}

    ${catRows.length?`<div class="card avoid-break">
      <div class="report-section-title">Category Breakdown</div>
      <table class="report-table">
        <thead><tr><th>Category</th><th>Items</th><th>Total Value</th><th>% of Total</th></tr></thead>
        <tbody>${catRows.map(r=>`<tr>
          <td><span style="display:inline-flex;align-items:center;gap:7px"><span style="width:8px;height:8px;border-radius:50%;background:${r.color};display:inline-block"></span>${r.name}</span></td>
          <td>${r.count}</td><td style="font-weight:600">${peso(r.value)}</td>
          <td>${totalVal>0?(r.value/totalVal*100).toFixed(1)+'%':'0%'}</td>
        </tr>`).join('')}</tbody>
      </table>
    </div>`:''}

    ${supRows.length?`<div class="card avoid-break">
      <div class="report-section-title">Supplier Summary</div>
      <table class="report-table">
        <thead><tr><th>Supplier</th><th>Contact</th><th>Items</th><th>Inventory Value</th></tr></thead>
        <tbody>${supRows.map(r=>`<tr>
          <td style="font-weight:500">${r.name}</td><td style="color:var(--text2)">${r.contact||'—'}</td>
          <td>${r.count}</td><td style="font-weight:600">${peso(r.value)}</td>
        </tr>`).join('')}</tbody>
      </table>
    </div>`:''}

    ${moves.length?`<div class="card avoid-break">
      <div class="report-section-title">All Movements — ${periodLbl} (${moves.length} total)</div>
      <table class="report-table">
        <thead><tr><th>Date</th><th>Item</th><th>Type</th><th>Quantity</th><th>Note</th></tr></thead>
        <tbody>${[...moves].reverse().map(m=>`<tr>
          <td style="color:var(--text2);white-space:nowrap">${fdateS(m.ts)}</td><td>${m.iname}</td>
          <td><span style="color:${m.type==='in'?'var(--success)':'var(--danger)'}">● ${m.type==='in'?'Stock In':'Stock Out'}</span></td>
          <td style="font-weight:600">${m.type==='in'?'+':'−'}${m.qty} ${m.unit}</td>
          <td style="color:var(--text2)">${m.note||'—'}</td>
        </tr>`).join('')}</tbody>
      </table>
    </div>`:''} 

    <div style="text-align:center;padding:14px;color:var(--text3);font-size:11px">${S.biz} · Inventory Report · ${periodLbl} · ${now}</div>`;
}

async function askAI(t){
  S.aiLoad=true;S.aiText='';if(S.view==='ai')renderView();
  const pmap={
    reorder:'Which items need urgent restocking based on qty vs reorder points? Give prioritized recommendations.',
    value:'Analyze inventory value by category and supplier. Flag overstocking or dead-stock concerns.',
    suppliers:'Analyze supplier dependency and risks based on items linked to each supplier.',
    movements:'From movement history, identify fastest/slowest moving items and any unusual patterns.',
    general:'Full inventory health: alerts, category performance, supplier summary, 3 immediate action items.'
  };
  const data={biz:S.biz,items:S.items.map(i=>({name:i.name,category:getCat(i.catId)?.name||'None',supplier:getSup(i.supId)?.name||'None',qty:i.qty,unit:i.unit,cost:i.cost,reorderPt:i.reorder,value:i.qty*i.cost,status:status(i)})),categories:S.categories.map(c=>({name:c.name,items:itemsByCat(c.id).length,value:itemsByCat(c.id).reduce((s,i)=>s+i.qty*i.cost,0)})),suppliers:S.suppliers.map(s=>({name:s.name,items:itemsBySup(s.id).length,value:itemsBySup(s.id).reduce((x,i)=>x+i.qty*i.cost,0)})),movements:S.movements.slice(-20),totals:{items:S.items.length,value:S.items.reduce((s,i)=>s+i.qty*i.cost,0),low:S.items.filter(i=>status(i)==='low').length,out:S.items.filter(i=>status(i)==='out').length}};
  try{
    const res=await fetch('https://inventorydark-night-5254.oliverosgeneviev.workers.dev',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:`You are an inventory AI for "${S.biz}" in the Philippines. ${pmap[t]}\n\nData:\n${JSON.stringify(data,null,2)}\n\nReply in plain text only. No markdown, no bullets, no asterisks. Be concise and actionable. Use ₱ for currency.`}]})
    });
    const d=await res.json();
    S.aiText=d.content?.[0]?.text||'Unable to generate analysis.';
  }catch{S.aiText='AI is unavailable. Check your Cloudflare Worker configuration.';}
  S.aiLoad=false;if(S.view==='ai')renderView();
}

function saveItem(id){

function openAddCat(){showModal(`<div class="modal-hdr"><div class="modal-title">Add Category</div><button class="btn-icon" onclick="closeModal()">${SVG_X}</button></div>${catFormHtml(null)}<div class="modal-ftr"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveCat(null)">Add</button></div>`);}
function openEditCat(id){const c=S.categories.find(x=>x.id===id);if(!c)return;showModal(`<div class="modal-hdr"><div class="modal-title">Edit Category</div><button class="btn-icon" onclick="closeModal()">${SVG_X}</button></div>${catFormHtml(c)}<div class="modal-ftr"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveCat('${id}')">Save</button></div>`);}

  if(!name){toast('Category name required');return;}

  if(id){const idx=S.categories.findIndex(x=>x.id===id);S.categories[idx]={...S.categories[idx],...cat};toast('Category updated ✓');}
  else{S.categories.push({id:uid(),...cat});toast('Category added ✓');}
  sC();closeModal();render();
}
function delCat(id){
  const c=S.categories.find(x=>x.id===id);if(!c)return;
  const cnt=itemsByCat(id).length;
  if(!confirm(cnt>0?`"${c.name}" has ${cnt} item(s). Deleting unlinks them. Continue?`:`Delete "${c.name}"?`))return;
  S.items=S.items.map(i=>i.catId===id?{...i,catId:''}:i);
  S.categories=S.categories.filter(x=>x.id!==id);
  sC();sI();toast('Category deleted');render();
}

// ══════════════════════════════════════
// LOG MOVEMENT
// ══════════════════════════════════════
function openLogMove(pid){
  const opts=S.items.map(i=>`<option value="${i.id}" ${i.id===pid?'selected':''}>${i.name} (${i.qty} ${i.unit})</option>`).join('');
  showModal(`<div class="modal-hdr"><div class="modal-title">Log Movement</div><button class="btn-icon" onclick="closeModal()">${SVG_X}</button></div>
    <div class="form-group"><label>Item</label><select id="m-i">${opts}</select></div>
    <div class="form-group"><label>Type</label>
      <div class="segment"><button class="seg-btn active" id="btn-in" onclick="setT('in')">📥 Stock In</button><button class="seg-btn" id="btn-out" onclick="setT('out')">📤 Stock Out</button></div>
      <input type="hidden" id="m-t" value="in">
    </div>
    <div class="form-group"><label>Quantity</label><input id="m-q" type="number" min="0.01" step="0.01" placeholder="Enter quantity"></div>
    <div class="form-group"><label>Note (optional)</label><input id="m-n" type="text" placeholder="e.g. Weekly restock / Used for baking"></div>
    <div class="modal-ftr"><button class="btn btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveMove()">Log</button></div>`);
}
function setT(t){document.getElementById('m-t').value=t;document.getElementById('btn-in').classList.toggle('active',t==='in');document.getElementById('btn-out').classList.toggle('active',t==='out');}
function saveMove(){
  const iid=document.getElementById('m-i').value,t=document.getElementById('m-t').value,q=parseFloat(document.getElementById('m-q').value),note=document.getElementById('m-n').value.trim();
  if(!q||q<=0){toast('Enter a valid quantity');return;}
  const i=S.items.find(x=>x.id===iid);if(!i)return;
  if(t==='out'&&q>i.qty){toast('Insufficient stock');return;}
  S.movements.push({id:uid(),iid,iname:i.name,type:t,qty:q,unit:i.unit,note,ts:Date.now()});
  const idx=S.items.findIndex(x=>x.id===iid);
  S.items[idx].qty=t==='in'?i.qty+q:i.qty-q;S.items[idx].ts=Date.now();
  sI();sM();toast('Movement logged ✓');closeModal();render();
}

// EXPORT CSV
// ══════════════════════════════════════
function exportCSV(){
  const h=['#','Name','Category','Supplier','Qty','Unit','Cost/Unit','Total Value','Reorder Pt','Status'];
  const rows=S.items.map((i,idx)=>[idx+1,i.name,getCat(i.catId)?.name||'',getSup(i.supId)?.name||'',i.qty,i.unit,i.cost,(i.qty*i.cost).toFixed(2),i.reorder,bsn[status(i)]]);
  const csv=[h,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download=`${S.biz.replace(/\s+/g,'-')}-inventory-${todayStr()}.csv`;
  a.click();toast('CSV exported ✓');
}
